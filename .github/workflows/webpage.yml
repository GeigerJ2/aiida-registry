---
# Publishes plugins_metadata.json to gh-pages on pushes to `master` and daily.
# The presentation layer (browser UI) is hosted on aiida.net/plugin-registry/,
# which fetches this JSON at build time.
name: webpage

on:
  schedule:
  # See https://help.github.com/en/actions/automating-your-workflow-with-github-actions/events-that-trigger-workflows#scheduled-events-schedule
  # run every day at 21:00 UTC
  - cron: "0 21 * * *"
  push:
    branches:
    - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  webpage:
    timeout-minutes: 90
    if: github.repository == 'aiidateam/aiida-registry'

    runs-on: ubuntu-latest
    env:
      COMMIT_AUTHOR: Deploy Action
      COMMIT_AUTHOR_EMAIL: action@github.com
    steps:
    - name: Checkout Repo ⚡️
      uses: actions/checkout@v4
    - name: Create dev environment
      uses: ./.github/actions/create-dev-env

    - name: Generate metadata
      uses: ./.github/actions/generate-metadata
      with:
        gh_token: ${{ secrets.GITHUB_TOKEN }}
        cache: false

    - name: Stage JSON and redirect stubs for deploy
      run: |
        mkdir -p public
        cp plugins_metadata.json public/
        # Ship pre-generated redirect stubs (root index, per-plugin pages,
        # smart 404) that forward visitors from this GitHub Pages site to
        # the canonical home at aiida.net/plugin-registry/.
        cp -a redirects/. public/

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        keep_files: true
